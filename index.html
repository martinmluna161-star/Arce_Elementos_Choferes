<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arce Hnos. — Control de Elementos por Chofer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo: #D62A35;
    --azul: #001841;
    --blanco: #FFFFFF;
    --gris-claro: #f4f5f7;
    --gris-borde: #dde1e9;
    --gris-texto: #4a5568;
    --verde: #16a34a;
    --amarillo: #ca8a04;
    --shadow: 0 2px 12px rgba(0,24,65,0.10);
    --shadow-lg: 0 8px 32px rgba(0,24,65,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--gris-claro);
    color: var(--azul);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--azul);
    color: var(--blanco);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 10px 20px;
    border-bottom: 3px solid var(--rojo);
  }
  .logo-arce {
    height: 45px;
    width: auto;
    flex-shrink: 0;
  }
  .header-title { flex: 1; }
  .header-title h1 {
    font-size: 1rem;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .header-title p {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
  }
  
  /* ── SYNC BANNER ── */
  .sync-banner {
    background: #002561;
    color: white;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.75rem;
    flex-wrap: wrap;
    gap: 10px;
  }
  .sync-url-input {
    flex: 1;
    min-width: 250px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
  }

  /* ── LAYOUT RESPONSIVO ── */
  .app-wrapper {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 120px);
  }

  @media (max-width: 850px) {
    .app-wrapper { grid-template-columns: 1fr; }
    .sidebar { height: 350px; position: relative; top: 0; border-right: none; border-bottom: 2px solid var(--gris-borde); }
    .header-badge { display: none; }
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--blanco);
    border-right: 1px solid var(--gris-borde);
    padding: 20px 0;
    overflow-y: auto;
    position: sticky;
    top: 120px;
  }
  .sidebar-section-title {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--rojo);
    text-transform: uppercase;
    padding: 0 20px 8px;
    letter-spacing: 1px;
  }
  .search-box { padding: 0 16px 15px; }
  .search-box input {
    width: 100%;
    padding: 10px;
    border: 1.5px solid var(--gris-borde);
    border-radius: 8px;
    font-family: inherit;
  }

  .chofer-item {
    padding: 12px 20px;
    cursor: pointer;
    border-left: 4px solid transparent;
    transition: 0.2s;
  }
  .chofer-item:hover { background: var(--gris-claro); }
  .chofer-item.active { background: #fff0f0; border-left-color: var(--rojo); }
  .chofer-name { font-weight: 800; font-size: 0.85rem; display: block; }
  .chofer-dni { font-size: 0.72rem; color: var(--gris-texto); }

  /* ── MAIN PANEL ── */
  .main-panel { padding: 25px; }
  
  .chofer-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 25px;
    flex-wrap: wrap;
    gap: 15px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 12px;
    margin-bottom: 25px;
  }
  .stat-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .stat-num { font-size: 1.5rem; font-weight: 900; display: block; }
  .stat-label { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: var(--gris-texto); }

  /* ── TABLAS RESPONSIVAS ── */
  .section-card {
    background: white;
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .section-card-header {
    background: var(--azul);
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
  }
  .table-container {
    width: 100%;
    overflow-x: auto; /* Permite scroll lateral en móviles */
  }
  .elementos-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 650px; /* Asegura que la tabla no se colapse */
  }
  .elementos-table th {
    background: #f8f9fc;
    padding: 12px 15px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--gris-texto);
  }
  .elementos-table td { padding: 12px 15px; border-bottom: 1px solid var(--gris-borde); vertical-align: middle; }

  /* ── BOTONES ── */
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: 0.2s;
  }
  .btn-primary { background: var(--rojo); color: white; }
  .btn-secondary { background: var(--azul); color: white; }
  .btn-success { background: var(--verde); color: white; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,24,65,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
  .form-group input, .form-group select { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--gris-borde); }

  .toast {
    position: fixed;
    bottom: 25px;
    right: 25px;
    padding: 12px 20px;
    border-radius: 10px;
    color: white;
    font-weight: 700;
    z-index: 1000;
    display: none;
    box-shadow: var(--shadow-lg);
  }

  @media print {
    header, .sidebar, .btn, .sync-banner { display: none !important; }
    .app-wrapper { display: block; }
    .main-panel { padding: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="logo colores (1).png" alt="ARCE Hnos." class="logo-arce">
    <div class="header-title">
      <h1>Control de Elementos por Chofer</h1>
      <p>Transporte Arce Hnos. · Río Cuarto</p>
    </div>
    <span class="header-badge" style="background:var(--rojo); padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800;">AUDITORÍA</span>
  </div>
  <div class="sync-banner">
    <div style="display:flex; align-items:center; gap:10px; flex:1;">
      <span>Sheet Sync:</span>
      <input type="text" class="sync-url-input" id="sheetUrl" placeholder="URL del Apps Script..." />
      <button class="btn-primary" style="padding: 5px 12px;" onclick="testConnection()">Conectar</button>
    </div>
    <span id="syncStatus" style="opacity:0.7;">Desconectado</span>
  </div>
</header>

<div id="toast" class="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 style="margin-bottom: 20px;">Asignar Nuevo Elemento</h3>
    <div class="form-group">
      <label>Elemento / Descripción</label>
      <input type="text" id="newElemento" placeholder="Matafuego,
