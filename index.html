<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arce Hnos. — Control de Elementos por Chofer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo: #D62A35;
    --azul: #001841;
    --blanco: #FFFFFF;
    --gris-claro: #f4f5f7;
    --gris-borde: #dde1e9;
    --gris-texto: #4a5568;
    --verde: #16a34a;
    --amarillo: #ca8a04;
    --shadow: 0 2px 12px rgba(0,24,65,0.10);
    --shadow-lg: 0 8px 32px rgba(0,24,65,0.15);
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--gris-claro);
    color: var(--azul);
    min-height: 100vh;
  }
 
  /* ── HEADER ── */
  header {
    background: var(--azul);
    color: var(--blanco);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 32px;
    border-bottom: 3px solid var(--rojo);
  }
  .logo-svg { flex-shrink: 0; }
  .header-title { flex: 1; }
  .header-title h1 {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .header-title p {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    font-weight: 600;
    margin-top: 2px;
  }
  .header-badge {
    background: var(--rojo);
    color: white;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
 
  /* ── LAYOUT ── */
  .app-wrapper {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 67px);
  }
 
  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--blanco);
    border-right: 1px solid var(--gris-borde);
    padding: 20px 0;
    overflow-y: auto;
    max-height: calc(100vh - 67px);
    position: sticky;
    top: 67px;
  }
  .sidebar-section-title {
    font-size: 0.68rem;
    font-weight: 800;
    color: var(--rojo);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 20px 8px;
    border-bottom: 1px solid var(--gris-borde);
    margin-bottom: 8px;
  }
  .search-box {
    padding: 0 16px 12px;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--gris-borde);
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    color: var(--azul);
  }
  .search-box input:focus { border-color: var(--rojo); }
 
  .chofer-item {
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .chofer-item:hover { background: var(--gris-claro); }
  .chofer-item.active {
    background: #fff0f0;
    border-left-color: var(--rojo);
  }
  .chofer-name {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--azul);
  }
  .chofer-dni {
    font-size: 0.72rem;
    color: var(--gris-texto);
  }
  .chofer-count {
    font-size: 0.68rem;
    color: var(--rojo);
    font-weight: 700;
    margin-top: 1px;
  }
 
  /* ── MAIN PANEL ── */
  .main-panel {
    padding: 28px 32px;
    overflow-y: auto;
  }
 
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--gris-texto);
    gap: 12px;
    opacity: 0.5;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 1rem; font-weight: 700; }
 
  /* ── CHOFER DETAIL ── */
  .chofer-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .chofer-info h2 {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--azul);
    text-transform: uppercase;
  }
  .chofer-info .dni-badge {
    display: inline-block;
    background: var(--azul);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .btn-primary { background: var(--rojo); color: white; }
  .btn-primary:hover { background: #b5202a; transform: translateY(-1px); }
  .btn-secondary { background: var(--azul); color: white; }
  .btn-secondary:hover { background: #002a5c; transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    color: var(--azul);
    border: 1.5px solid var(--gris-borde);
  }
  .btn-outline:hover { border-color: var(--azul); background: var(--gris-claro); }
  .btn-success { background: var(--verde); color: white; }
  .btn-success:hover { background: #15803d; }
 
  /* ── STATS ROW ── */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 12px 18px;
    flex: 1;
    min-width: 120px;
    box-shadow: var(--shadow);
  }
  .stat-card .stat-num {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--rojo);
    line-height: 1;
  }
  .stat-card .stat-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--gris-texto);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
 
  /* ── SECTION CARD ── */
  .section-card {
    background: white;
    border: 1px solid var(--gris-borde);
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .section-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--azul);
    color: white;
  }
  .section-card-header h3 {
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .section-card-header span {
    font-size: 0.72rem;
    opacity: 0.7;
  }
 
  /* ── ELEMENTOS TABLE ── */
  .elementos-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
  }
  .elementos-table th {
    background: #f8f9fc;
    padding: 10px 16px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gris-texto);
    border-bottom: 1px solid var(--gris-borde);
  }
  .elementos-table td {
    padding: 11px 16px;
    border-bottom: 1px solid var(--gris-borde);
    vertical-align: middle;
  }
  .elementos-table tr:last-child td { border-bottom: none; }
  .elementos-table tr:hover td { background: #fafbff; }
 
  .elemento-name { font-weight: 700; color: var(--azul); }
  .vehiculo-tag {
    display: inline-block;
    background: var(--azul);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin: 1px 2px;
    letter-spacing: 0.03em;
  }
  .fecha-badge {
    font-size: 0.72rem;
    color: var(--gris-texto);
    font-weight: 600;
    white-space: nowrap;
  }
 
  /* Estado auditoría */
  .audit-cell { display: flex; align-items: center; gap: 8px; }
  .audit-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .status-ok { background: #dcfce7; color: #166534; }
  .status-faltante { background: #fee2e2; color: #991b1b; }
  .status-pendiente { background: #fef9c3; color: #854d0e; }
 
  .audit-select {
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    border: 1.5px solid var(--gris-borde);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    color: var(--azul);
    background: white;
  }
  .audit-select:focus { border-color: var(--rojo); }
 
  /* Nota cell */
  .nota-input {
    width: 100%;
    min-width: 160px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    border: 1.5px solid var(--gris-borde);
    border-radius: 6px;
    padding: 5px 8px;
    outline: none;
    color: var(--azul);
    resize: none;
    transition: border-color 0.2s;
  }
  .nota-input:focus { border-color: var(--rojo); }
 
  /* ── NUEVO ELEMENTO FORM ── */
  .add-form {
    padding: 16px 20px;
    background: #f8f9fc;
    border-top: 1px solid var(--gris-borde);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .form-group label {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--gris-texto);
  }
  .form-group input, .form-group select {
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    padding: 8px 10px;
    border: 1.5px solid var(--gris-borde);
    border-radius: 7px;
    outline: none;
    color: var(--azul);
    transition: border-color 0.2s;
    background: white;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--rojo); }
 
  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,24,65,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    width: 90%;
    max-width: 520px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    background: var(--azul);
    color: white;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 0.95rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal-close {
    background: none;
    border: none;
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
    opacity: 0.7;
    line-height: 1;
  }
  .modal-close:hover { opacity: 1; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; background: #f8f9fc; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--gris-borde); }
 
  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--azul);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 700;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 8px;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    border-left: 4px solid var(--rojo);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
 
  /* ── PRINT STYLES ── */
  @media print {
    header, .sidebar, .btn-group, .add-form, .search-box { display: none !important; }
    body { background: white; }
    .app-wrapper { display: block; }
    .main-panel { padding: 0; }
    .section-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    .audit-select, .nota-input { border: none; background: transparent; }
 
    .print-header {
      display: flex !important;
      align-items: center;
      gap: 16px;
      padding: 0 0 16px;
      border-bottom: 3px solid var(--rojo);
      margin-bottom: 24px;
    }
    .print-header h1 { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; color: var(--azul); }
    .print-header p { font-size: 0.75rem; color: #666; }
  }
  .print-header { display: none; }
 
  /* ── GOOGLE SHEET SYNC BANNER ── */
  .sync-banner {
    background: linear-gradient(135deg, #001841 0%, #002a5c 100%);
    color: white;
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.78rem;
    font-weight: 600;
    gap: 12px;
    flex-wrap: wrap;
  }
  .sync-banner .sync-left { display: flex; align-items: center; gap: 8px; }
  .sync-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .sync-url-input {
    font-family: 'Nunito', sans-serif;
    font-size: 0.75rem;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    width: 380px;
    max-width: 100%;
    outline: none;
  }
  .sync-url-input::placeholder { color: rgba(255,255,255,0.5); }
  .sync-url-input:focus { border-color: var(--rojo); }
  .btn-sync {
    background: var(--rojo);
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-sync:hover { background: #b5202a; }
 
  /* Divider entre entregas */
  .entrega-block { border-bottom: 1px dashed var(--gris-borde); }
  .entrega-block:last-child { border-bottom: none; }
 
  .highlight-row td { background: #fff9f0 !important; }
</style>
</head>
<body>
 
<!-- HEADER -->
<header>
  <div class="header-inner">
    <!-- Logo SVG recreado desde el manual de marca -->
    <svg class="logo-svg" width="110" height="44" viewBox="0 0 110 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(0,4)">
        <!-- Símbolo =O -->
        <rect x="0" y="0" width="22" height="3.5" rx="1.75" fill="#D62A35"/>
        <rect x="0" y="6" width="16" height="3.5" rx="1.75" fill="#D62A35"/>
        <circle cx="30" cy="9" r="9" fill="none" stroke="#D62A35" stroke-width="3.5"/>
        <line x1="30" y1="0" x2="30" y2="3" stroke="#D62A35" stroke-width="3.5"/>
      </g>
      <!-- ARCE Hnos. text -->
      <text x="0" y="40" font-family="Impact, Arial Black, sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="0.5">ARCE Hnos.</text>
    </svg>
    <div class="header-title">
      <h1>Control de Elementos por Chofer</h1>
      <p>Transporte Arce Hnos. · CUIT 30-71535215-6 · Río Cuarto</p>
    </div>
    <span class="header-badge">Sistema de Auditoría</span>
  </div>
  <div class="sync-banner">
    <div class="sync-left">
      <div class="sync-indicator"></div>
      <span>Sincronización con Google Sheets:</span>
      <input type="text" class="sync-url-input" id="sheetUrl" placeholder="Pegá aquí la URL del Web App de Apps Script (Deploy)..." />
      <button class="btn-sync" onclick="testConnection()">Conectar</button>
    </div>
    <span id="syncStatus" style="opacity:0.6;">Sin conexión — los cambios se guardan localmente</span>
  </div>
</header>
 
<!-- TOAST -->
<div class="toast" id="toast"></div>
 
<!-- MODAL NUEVO ELEMENTO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Asignar Nuevo Elemento</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group" style="grid-column:1/-1">
          <label>Elemento / Descripción</label>
          <input type="text" id="newElemento" placeholder="Ej: Matafuego 5 kg" />
        </div>
        <div class="form-group">
          <label>Vehículo (Camión)</label>
          <input type="text" id="newVehiculo1" placeholder="Ej: AF713FD" />
        </div>
        <div class="form-group">
          <label>Vehículo (Semi) — Opcional</label>
          <input type="text" id="newVehiculo2" placeholder="Ej: AH191HA" />
        </div>
        <div class="form-group">
          <label>Fecha de Entrega</label>
          <input type="date" id="newFecha" />
        </div>
        <div class="form-group">
          <label>Estado Inicial</label>
          <select id="newEstado">
            <option value="Presente">✅ Presente</option>
            <option value="Pendiente" selected>⏳ Pendiente verificación</option>
            <option value="Faltante">❌ Faltante</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Notas</label>
          <input type="text" id="newNota" placeholder="Observaciones opcionales..." />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="agregarElemento()">➕ Agregar Elemento</button>
    </div>
  </div>
</div>
 
<!-- APP -->
<div class="app-wrapper">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section-title">Choferes</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar chofer..." oninput="filterChoferes()" />
    </div>
    <div id="choferList"></div>
  </aside>
 
  <!-- MAIN -->
  <main class="main-panel" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <p>Seleccioná un chofer para ver sus elementos</p>
    </div>
    <div id="choferDetail" style="display:none"></div>
  </main>
</div>
 
<script>

// STATE

let currentChoferId = null;
let auditData = {}; // auditData[choferId][elementoKey] = { estado, nota }
let sheetWebAppUrl = '';
 
// Cargar de localStorage
function loadLocal() {
  const saved = localStorage.getItem('arce_audit');
  if (saved) auditData = JSON.parse(saved);
  const url = localStorage.getItem('arce_sheet_url');
  if (url) {
    sheetWebAppUrl = url;
    document.getElementById('sheetUrl').value = url;
  }
}
 
function saveLocal() {
  localStorage.setItem('arce_audit', JSON.stringify(auditData));
}
 
// ══════════════════════════════════════════════
// RENDER SIDEBAR
// ══════════════════════════════════════════════
function renderSidebar(filter = '') {
  const list = document.getElementById('choferList');
  list.innerHTML = '';
  const q = filter.toLowerCase();
  DB.choferes
    .filter(c => c.nombre.toLowerCase().includes(q) || c.dni.includes(q))
    .forEach(c => {
      const totalElementos = c.entregas.reduce((s, e) => s + e.elementos.length, 0);
      const div = document.createElement('div');
      div.className = 'chofer-item' + (c.id === currentChoferId ? ' active' : '');
      div.innerHTML = `
        <span class="chofer-name">${capitalize(c.nombre)}</span>
        <span class="chofer-dni">DNI ${c.dni}</span>
        <span class="chofer-count">${totalElementos} elemento${totalElementos !== 1 ? 's' : ''} · ${c.entregas.length} entrega${c.entregas.length !== 1 ? 's' : ''}</span>
      `;
      div.onclick = () => selectChofer(c.id);
      list.appendChild(div);
    });
}
 
function filterChoferes() {
  renderSidebar(document.getElementById('searchInput').value);
}
 
function capitalize(str) {
  return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
}
 
// ══════════════════════════════════════════════
// SELECT CHOFER
// ══════════════════════════════════════════════
function selectChofer(id) {
  currentChoferId = id;
  renderSidebar(document.getElementById('searchInput').value);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('choferDetail').style.display = 'block';
  renderDetail();
}
 
function renderDetail() {
  const chofer = DB.choferes.find(c => c.id === currentChoferId);
  if (!chofer) return;
 
  const totalElem = chofer.entregas.reduce((s, e) => s + e.elementos.length, 0);
  const auditKey = `ch_${chofer.id}`;
  if (!auditData[auditKey]) auditData[auditKey] = {};
 
  // contar estados
  let ok = 0, falt = 0, pend = 0;
  chofer.entregas.forEach(e => {
    e.elementos.forEach((el, ei) => {
      const k = `${e.fecha}_${ei}`;
      const estado = auditData[auditKey][k]?.estado || 'Pendiente';
      if (estado === 'Presente') ok++;
      else if (estado === 'Faltante') falt++;
      else pend++;
    });
  });
 
  let html = `
    <div class="print-header">
      <div>
        <h1>${capitalize(chofer.nombre)}</h1>
        <p>DNI ${chofer.dni} · Transporte Arce Hnos · Impreso ${new Date().toLocaleDateString('es-AR')}</p>
      </div>
    </div>
    <div class="chofer-header">
      <div class="chofer-info">
        <h2>${capitalize(chofer.nombre)}</h2>
        <span class="dni-badge">DNI ${chofer.dni}</span>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="openModal()">➕ Nuevo elemento</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimir / PDF</button>
        <button class="btn btn-success" onclick="syncToSheet()">☁️ Sincronizar Sheet</button>
      </div>
    </div>
 
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${totalElem}</div><div class="stat-label">Elementos totales</div></div>
      <div class="stat-card"><div class="stat-num">${chofer.entregas.length}</div><div class="stat-label">Entregas registradas</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--verde)">${ok}</div><div class="stat-label">Presentes ✅</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--rojo)">${falt}</div><div class="stat-label">Faltantes ❌</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amarillo)">${pend}</div><div class="stat-label">Sin verificar ⏳</div></div>
    </div>
  `;
 
  chofer.entregas.forEach((entrega, ei) => {
    const vehs = entrega.vehiculos.length > 0
      ? entrega.vehiculos.map(v => `<span class="vehiculo-tag">${v}</span>`).join('')
      : '<span style="opacity:0.5;font-size:0.75rem">—</span>';
 
    html += `
      <div class="section-card">
        <div class="section-card-header">
          <h3>📋 Entrega ${ei + 1} — ${formatFecha(entrega.fecha)}</h3>
          <span>${vehs}</span>
        </div>
        <table class="elementos-table">
          <thead>
            <tr>
              <th style="width:36%">Elemento</th>
              <th style="width:15%">Unidades</th>
              <th style="width:12%">Fecha</th>
              <th style="width:17%">Estado Auditoría</th>
              <th>Notas</th>
            </tr>
          </thead>
          <tbody>
    `;
 
    entrega.elementos.forEach((el, eli) => {
      const k = `${entrega.fecha}_${eli}`;
      const saved = auditData[auditKey][k] || {};
      const estado = saved.estado || 'Pendiente';
      const nota = saved.nota || '';
 
      const estadoClass = estado === 'Presente' ? 'status-ok' : estado === 'Faltante' ? 'status-faltante' : 'status-pendiente';
      const estadoIcon = estado === 'Presente' ? '✅' : estado === 'Faltante' ? '❌' : '⏳';
 
      html += `
        <tr id="row_${currentChoferId}_${entrega.fecha}_${eli}">
          <td class="elemento-name">${capitalize(el)}</td>
          <td>${vehs}</td>
          <td class="fecha-badge">${formatFecha(entrega.fecha)}</td>
          <td>
            <select class="audit-select" onchange="updateAudit(${currentChoferId}, '${entrega.fecha}', ${eli}, this.value, null)">
              <option value="Presente" ${estado === 'Presente' ? 'selected' : ''}>✅ Presente</option>
              <option value="Faltante" ${estado === 'Faltante' ? 'selected' : ''}>❌ Faltante</option>
              <option value="Pendiente" ${estado === 'Pendiente' ? 'selected' : ''}>⏳ Pendiente</option>
            </select>
          </td>
          <td>
            <input type="text" class="nota-input" placeholder="Agregar nota..."
              value="${escHTML(nota)}"
              onchange="updateAudit(${currentChoferId}, '${entrega.fecha}', ${eli}, null, this.value)" />
          </td>
        </tr>
      `;
    });
 
    html += `</tbody></table></div>`;
  });
 
  document.getElementById('choferDetail').innerHTML = html;
}
 
function formatFecha(f) {
  if (!f) return '—';
  const [y, m, d] = f.split('-');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d} ${meses[parseInt(m)-1]} ${y}`;
}
 
function escHTML(s) {
  return s.replace(/"/g, '&quot;').replace(/</g, '&lt;');
}
 
// ══════════════════════════════════════════════
// AUDIT UPDATE
// ══════════════════════════════════════════════
function updateAudit(choferId, fecha, eli, newEstado, newNota) {
  const auditKey = `ch_${choferId}`;
  if (!auditData[auditKey]) auditData[auditKey] = {};
  const k = `${fecha}_${eli}`;
  if (!auditData[auditKey][k]) auditData[auditKey][k] = { estado: 'Pendiente', nota: '' };
 
  if (newEstado !== null) auditData[auditKey][k].estado = newEstado;
  if (newNota !== null) auditData[auditKey][k].nota = newNota;
 
  saveLocal();
  // Actualizar stats sin re-render completo
  const chofer = DB.choferes.find(c => c.id === choferId);
  if (chofer) {
    let ok = 0, falt = 0, pend = 0;
    chofer.entregas.forEach(e => {
      e.elementos.forEach((el, ei) => {
        const ky = `${e.fecha}_${ei}`;
        const estado = auditData[auditKey][ky]?.estado || 'Pendiente';
        if (estado === 'Presente') ok++;
        else if (estado === 'Faltante') falt++;
        else pend++;
      });
    });
    const cards = document.querySelectorAll('.stat-card .stat-num');
    if (cards.length >= 5) {
      cards[2].textContent = ok;
      cards[3].textContent = falt;
      cards[4].textContent = pend;
    }
  }
 
  showToast('💾 Cambio guardado localmente');
}

  document.getElementById('newFecha').value = today;
  document.getElementById('newElemento').value = '';
  document.getElementById('newVehiculo1').value = '';
  document.getElementById('newVehiculo2').value = '';
  document.getElementById('newNota').value = '';
  document.getElementById('newEstado').value = 'Pendiente';
  document.getElementById('modalOverlay').classList.add('open');
}
 
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
 
function agregarElemento() {
  const el = document.getElementById('newElemento').value.trim();
  if (!el) { showToast('⚠️ Ingresá el nombre del elemento', true); return; }
  const fecha = document.getElementById('newFecha').value;
  if (!fecha) { showToast('⚠️ Ingresá la fecha de entrega', true); return; }
  const v1 = document.getElementById('newVehiculo1').value.trim().toUpperCase();
  const v2 = document.getElementById('newVehiculo2').value.trim().toUpperCase();
  const nota = document.getElementById('newNota').value.trim();
  const estado = document.getElementById('newEstado').value;
 
  const chofer = DB.choferes.find(c => c.id === currentChoferId);
 
  // Buscar si ya hay una entrega de esa fecha
  let entrega = chofer.entregas.find(e => e.fecha === fecha && JSON.stringify(e.vehiculos) === JSON.stringify([v1, v2].filter(Boolean)));
  if (!entrega) {
    entrega = { fecha, vehiculos: [v1, v2].filter(Boolean), elementos: [] };
    chofer.entregas.push(entrega);
    chofer.entregas.sort((a, b) => a.fecha.localeCompare(b.fecha));
  }
  entrega.elementos.push(el);
 
  const eli = entrega.elementos.length - 1;
  const auditKey = `ch_${currentChoferId}`;
  if (!auditData[auditKey]) auditData[auditKey] = {};
  const k = `${fecha}_${eli}`;
  auditData[auditKey][k] = { estado, nota };
  saveLocal();
 
  closeModal();
  renderDetail();
  showToast('✅ Elemento agregado correctamente');
}
 
// ══════════════════════════════════════════════
// SYNC CON GOOGLE SHEETS
// ══════════════════════════════════════════════
function testConnection() {
  const url = document.getElementById('sheetUrl').value.trim();
  if (!url || !url.startsWith('https://')) {
    showToast('⚠️ Ingresá una URL válida del Web App', true);
    return;
  }
  sheetWebAppUrl = url;
  localStorage.setItem('arce_sheet_url', url);
  document.getElementById('syncStatus').textContent = '✅ URL guardada — hacé clic en "Sincronizar Sheet" para enviar datos';
  showToast('🔗 URL configurada correctamente');
}
 
async function syncToSheet() {
  if (!sheetWebAppUrl) {
    showToast('⚠️ Configurá primero la URL del Web App de Apps Script', true);
    return;
  }
  const chofer = DB.choferes.find(c => c.id === currentChoferId);
  if (!chofer) return;
 
  const rows = [];
  const auditKey = `ch_${chofer.id}`;
 
  chofer.entregas.forEach(entrega => {
    entrega.elementos.forEach((el, eli) => {
      const k = `${entrega.fecha}_${eli}`;
      const saved = auditData[auditKey]?.[k] || {};
      rows.push({
        chofer: chofer.nombre,
        dni: chofer.dni,
        fecha_entrega: entrega.fecha,
        vehiculos: entrega.vehiculos.join(' / '),
        elemento: el,
        estado: saved.estado || 'Pendiente',
        nota: saved.nota || '',
        fecha_auditoria: new Date().toISOString().split('T')[0]
      });
    });
  });
 
  try {
    document.getElementById('syncStatus').textContent = '⏳ Sincronizando...';
    const resp = await fetch(sheetWebAppUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'sync', chofer: chofer.nombre, rows })
    });
    const result = await resp.json();
    document.getElementById('syncStatus').textContent = `✅ Sincronizado el ${new Date().toLocaleTimeString('es-AR')}`;
    showToast('☁️ Datos enviados al Google Sheet');
  } catch (err) {
    document.getElementById('syncStatus').textContent = '❌ Error de conexión';
    showToast('❌ No se pudo conectar con el Sheet. Revisá la URL.', true);
  }
}
 
// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimeout;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#b91c1c' : 'var(--azul)';
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2800);
}

loadLocal();
renderSidebar();
 
document.getElementById('sheetUrl').addEventListener('change', function() {
  sheetWebAppUrl = this.value.trim();
  localStorage.setItem('arce_sheet_url', sheetWebAppUrl);
});
