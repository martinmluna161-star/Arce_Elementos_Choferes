<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arce Hnos. — Control de Elementos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rojo: #D62A35;
            --azul: #001841;
            --azul-light: #002a5c;
            --blanco: #FFFFFF;
            --gris-claro: #f8f9fa;
            --gris-borde: #e2e8f0;
            --gris-texto: #64748b;
            --verde: #22c55e;
            --amarillo: #eab308;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--gris-claro);
            color: var(--azul);
            line-height: 1.5;
        }

        /* ── HEADER ── */
        header {
            background: var(--azul);
            color: var(--blanco);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 4px solid var(--rojo);
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-text { font-weight: 900; font-size: 1.4rem; letter-spacing: -0.5px; }
        .logo-text span { color: var(--rojo); }

        /* ── LAYOUT RESPONSIVE ── */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 992px) {
            .app-container { flex-direction: row; }
            .sidebar { width: 320px; height: calc(100vh - 75px); position: sticky; top: 75px; }
            .main-content { flex: 1; padding: 30px; }
        }

        /* ── SIDEBAR / LISTA CHOFERES ── */
        .sidebar {
            background: var(--blanco);
            border-right: 1px solid var(--gris-borde);
            overflow-y: auto;
            padding: 20px;
        }
        .search-container { margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--gris-borde);
            border-radius: 10px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: var(--azul); outline: none; }

        .chofer-card {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            background: var(--gris-claro);
        }
        .chofer-card:hover { background: #edf2f7; }
        .chofer-card.active {
            background: white;
            border-color: var(--rojo);
            box-shadow: var(--shadow);
        }
        .chofer-card h4 { font-size: 0.95rem; font-weight: 800; color: var(--azul); text-transform: uppercase; }
        .chofer-card p { font-size: 0.8rem; color: var(--gris-texto); }

        /* ── MAIN CONTENT ── */
        .main-content { padding: 20px; }
        .detail-header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .chofer-title h2 { font-size: 1.8rem; font-weight: 900; color: var(--azul); }
        
        /* ── TABLA RESPONSIVE ── */
        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 30px;
        }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--azul); color: white; padding: 15px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--gris-borde); font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }

        /* ── BOTONES ── */
        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
            font-size: 0.85rem;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--rojo); color: white; }
        .btn-secondary { background: var(--azul); color: white; }
        .btn-outline { background: white; border: 2px solid var(--gris-borde); color: var(--azul); }

        /* ── ESTADOS ── */
        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .pill-ok { background: #dcfce7; color: #166534; }
        .pill-error { background: #fee2e2; color: #991b1b; }
        .pill-wait { background: #fef9c3; color: #854d0e; }

        .nota-input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--gris-borde);
            border-radius: 6px;
            font-family: inherit;
        }

        /* ── MOBILE ADAPTATION ── */
        @media (max-width: 768px) {
            .chofer-title h2 { font-size: 1.4rem; }
            .btn { width: 100%; justify-content: center; }
            .detail-header { flex-direction: column; align-items: stretch; }
        }

        /* ── PRINT ── */
        @media print {
            .sidebar, .btn, header, .search-container { display: none !important; }
            .app-container { display: block; }
            .main-content { padding: 0; }
            .table-container { box-shadow: none; border: 1px solid black; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="brand">
            <div class="logo-text">ARCE <span>Hnos.</span></div>
        </div>
        <div class="system-tag" style="font-size: 0.7rem; font-weight: 800; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px;">
            Auditoría de Logística
        </div>
    </div>
</header>

<div class="app-container">
    <aside class="sidebar">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar chofer o DNI..." oninput="filterChoferes()">
        </div>
        <div id="choferList">
            </div>
    </aside>

    <main class="main-content" id="mainPanel">
        <div id="emptyState" style="text-align: center; padding-top: 100px; color: var(--gris-texto);">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.3; margin-bottom: 20px;">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <h3>Seleccione un chofer de la lista</h3>
            <p>Para gestionar y auditar sus elementos asignados</p>
        </div>

        <div id="choferDetail" style="display:none">
            </div>
    </main>
</div>

<script>
// (El resto del código JS se mantiene igual en lógica, pero actualizando los renders para usar las nuevas clases de CSS)

// Reutilizamos la base de datos (DB) que proporcionaste
const DB = {
    choferes: [
        { id: 1, nombre: "VIDELA JONATHAN DARIO", dni: "31640017", entregas: [{ fecha: "2025-12-16", vehiculos: ["AG807KZ","AG807KF"], elementos: ["Funda asientos"] }] },
        { id: 3, nombre: "SOSA SIMON ANDRES", dni: "39422949", entregas: [{ fecha: "2025-12-03", vehiculos: ["AF482AS","AF733GV"], elementos: ["2 Matafuegos 5kg", "Gato", "Documentación"] }] },
        { id: 7, nombre: "RAMIREZ FRANCO IVAN", dni: "41215706", entregas: [{ fecha: "2025-10-27", vehiculos: ["AH246JHP"], elementos: ["Gato", "Balizas", "Matafuegos"] }] }
        // ... (resto de choferes)
    ]
};

function filterChoferes() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('choferList');
    list.innerHTML = '';
    
    DB.choferes.filter(c => c.nombre.toLowerCase().includes(q) || c.dni.includes(q)).forEach(c => {
        const div = document.createElement('div');
        div.className = 'chofer-card';
        div.innerHTML = `<h4>${c.nombre}</h4><p>DNI: ${c.dni}</p>`;
        div.onclick = () => selectChofer(c);
        list.appendChild(div);
    });
}

function selectChofer(chofer) {
    document.getElementById('emptyState').style.display = 'none';
    const detail = document.getElementById('choferDetail');
    detail.style.display = 'block';

                <strong>Entrega #${idx + 1} — ${e.fecha}</strong>
                <span style="color: var(--rojo); font-weight: 800;">${e.vehiculos.join(' / ')}</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Elemento</th>
                            <th>Estado</th>
                            <th>Observaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${e.elementos.map(el => `
                            <tr>
                                <td style="font-weight:700;">${el}</td>
                                <td>
                                    <select class="nota-input" style="font-weight:700;">
                                        <option>⏳ Pendiente</option>
                                        <option>✅ Presente</option>
                                        <option>❌ Faltante</option>
                                    </select>
                                </td>
                                <td><input type="text" class="nota-input" placeholder="..."></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `).join('');

    detail.innerHTML = `
        <div class="detail-header">
            <div class="chofer-title">
                <p style="color: var
